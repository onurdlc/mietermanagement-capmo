<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>innoclix mm – Clickdemo</title><style>:root{--bg:#f5f7f9;--card:#fff;--border:#dfe5ea;--text:#071226;--muted:#6b7a8c;--cyan:#08b7ca;--green:#00d994;--teal:#11b7b6;--shadow:0 12px 32px rgba(7,18,38,.08);--radius:14px}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font-family:inherit}.app{min-height:100vh}.topbar{height:88px;background:#fff;border-bottom:3px solid var(--cyan);display:flex;align-items:center;justify-content:space-between;padding:0 28px;box-shadow:0 4px 14px rgba(0,0,0,.04)}.logo{display:flex;align-items:center;gap:14px}.mark{display:flex;align-items:center;gap:8px;font-weight:300;font-size:30px;letter-spacing:.06em}.ix{font-weight:900;font-size:44px;letter-spacing:-.12em;line-height:1}.ix .i{color:#071226}.ix .x{background:linear-gradient(180deg,var(--green),var(--cyan));-webkit-background-clip:text;color:transparent}.brand-small{font-weight:600;color:var(--green);letter-spacing:.08em}.claim{font-size:9px;color:#7b8ba0;letter-spacing:.45em;margin-top:2px}.nav{display:flex;gap:28px;align-items:center;height:100%;font-weight:700;color:#555}.nav button{height:100%;border:0;background:transparent;font-size:15px;font-weight:800;color:#555;padding:0 6px;cursor:pointer;border-bottom:3px solid transparent}.nav button.active{color:var(--cyan);border-bottom-color:var(--cyan)}.userbox{display:flex;gap:14px;align-items:center}.pill{background:#eaf8fb;border-radius:10px;padding:10px 16px;color:#009fb7;font-weight:800}.btn{border:0;border-radius:7px;background:linear-gradient(90deg,#05b6c6,#08aca8);color:#fff;padding:11px 18px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(0,174,187,.2)}.btn.secondary{background:#fff;color:#0aaabe;border:1px solid #cfeaf0;box-shadow:none}.btn.ghost{background:transparent;color:var(--cyan);box-shadow:none}.btn.danger{background:#fff;color:#e05252;border:1px solid #ffd0d0;box-shadow:none}.layout{display:flex}.content{width:100%;padding:24px 28px 36px}.toolbar{display:flex;justify-content:space-between;gap:16px;margin-bottom:24px}.filters{display:flex;gap:12px;flex-wrap:wrap}.input,.select,textarea{border:1px solid #ccd5dd;background:#fff;border-radius:6px;padding:11px 14px;font-size:15px;min-width:220px}.grid{display:grid;grid-template-columns:repeat(3,minmax(260px,1fr));gap:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 2px 5px rgba(0,0,0,.03)}.project-card{height:205px;padding:22px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:.18s}.project-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:#b9eef2}.project-title{font-size:21px;margin-bottom:10px}.project-address{font-size:13px;color:#111;line-height:1.45}.stats{display:flex;justify-content:space-between;align-items:end}.stat strong{display:block;font-size:19px}.stat span{font-size:12px;color:#111}.login-bg{min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr;background:linear-gradient(120deg,#f7fbfd,#eef5f7)}.hero{padding:64px 74px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}.hero:before{content:"";position:absolute;left:-140px;bottom:-160px;width:520px;height:520px;border-radius:50%;background:rgba(0,217,148,.08)}.hero h1{font-size:54px;line-height:1.05;margin:24px 0 18px;letter-spacing:-.04em}.hero p{font-size:19px;color:#5f7184;max-width:600px;line-height:1.6}.login-panel{display:flex;align-items:center;justify-content:center;padding:50px}.login-card{width:420px;background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:36px}.role-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:28px 0}.role-tabs button{font-size:12px;border:1px solid #d8e5ea;background:#fff;border-radius:8px;padding:10px 6px;cursor:pointer;font-weight:800;color:#5b6b7b}.role-tabs button.active{background:#e9fbfc;color:#00a9bc;border-color:#00b7c8}.form-group{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}.form-group label{font-size:12px;font-weight:800;color:#4b5b6b}.dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.dash-head h1{margin:0;font-size:25px}.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:20px}.kpi{padding:18px}.kpi small{font-weight:800;color:#566779}.kpi strong{display:block;font-size:30px;margin-top:12px}.kpi .delta{color:#e15252;font-size:12px;font-weight:800}.main-grid{display:grid;grid-template-columns:2fr .9fr;gap:18px}.section{padding:20px}.section h2{font-size:17px;margin:0 0 16px}table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:#5d6c7c;font-size:12px;padding:12px;border-bottom:1px solid #edf1f3}td{padding:14px 12px;border-bottom:1px solid #edf1f3}.badge{display:inline-flex;border-radius:7px;padding:5px 9px;font-size:12px;font-weight:800}.red{background:#ffeaea;color:#e14a4a}.yellow{background:#fff5d8;color:#b47a00}.green{background:#e5f8ef;color:#169b57}.blue{background:#e8f8fb;color:#00a3b7}.tenant-grid{display:grid;grid-template-columns:2fr 1fr;gap:18px}.ticket-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.ticket{padding:18px;min-height:136px;display:flex;flex-direction:column;justify-content:space-between}.ticket h3{font-size:15px;margin:10px 0 8px}.muted{color:#6b7a8c;font-size:13px}.messages .msg{padding:14px;border:1px solid #edf1f3;border-radius:10px;margin-bottom:10px}.quickgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.quick{padding:22px;min-height:120px;cursor:pointer}.quick b{display:block;margin-bottom:8px}.modal{position:fixed;inset:0;background:rgba(7,18,38,.38);display:none;align-items:center;justify-content:center;padding:24px;z-index:5}.modal.show{display:flex}.modal-card{width:min(760px,100%);background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:28px}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.close{border:0;background:#f0f4f6;border-radius:8px;width:34px;height:34px;cursor:pointer}.steps{display:flex;gap:8px;margin:16px 0}.step{height:6px;flex:1;background:#dfe9ed;border-radius:4px}.step.active{background:var(--cyan)}.hidden{display:none!important}@media(max-width:1000px){.grid,.kpis,.ticket-row{grid-template-columns:1fr 1fr}.main-grid,.tenant-grid,.login-bg{grid-template-columns:1fr}.nav{display:none}.hero{padding:36px}.hero h1{font-size:38px}}@media(max-width:640px){.grid,.kpis,.ticket-row,.quickgrid{grid-template-columns:1fr}.topbar{padding:0 14px}.content{padding:18px}.login-card{width:100%;padding:24px}.hero{display:none}}</style></head><body><div id="app" class="app"></div><script>const state={screen:'login',role:'tenant',selectedProject:null};const projects=[['GWL_DWS_Demo1','Ridderstraße 37–39, 80339 München, Deutschland','17.11.2024',11,0],['AEC - Amelia Earhart Center','Konrad-Adenauer-Ring 39, 65187 Wiesbaden, Deutschland','01.01.2026',3,1],['Großer Hasenpfad 109, Frankfurt','Großer Hasenpfad 109, 60598 Frankfurt am Main, Deutschland','03.09.2025',3,3],['DLC App Sync Test','Trakehner Straße 7, 60487 Frankfurt am Main, Deutschland','01.05.2025',9,0],['Wiesbaden, Umbau Lagerhalle 01859','Clay Kaserne Wiesbaden Youth Baseball Field, 65205 Wiesbaden','16.04.2024',4,0],['Lufthansa VCC','Flughafen Frankfurt (FRA), 60547 Frankfurt am Main, Deutschland','04.09.2023',53,0]];function logo(){return `<div class="logo"><div><div class="mark"><span class="ix"><span class="i">I</span><span class="x">X</span></span><span>innoclix</span><span class="brand-small">mm</span></div><div class="claim">WHERE INNOVATION CLICKS</div></div></div>`}function topbar(active='overview'){return `<div class="topbar">${logo()}<div class="nav">${['overview:ÜBERSICHT','projects:PROJEKTE','issues:ANLIEGEN','appointments:TERMINE','capmo:CAPMO IMPORT','settings:EINSTELLUNGEN'].map(x=>{const[id,label]=x.split(':');return `<button class="${active==id?'active':''}" onclick="go('${id}')">${label}</button>`}).join('')}</div><div class="userbox"><button class="pill">DE⌄</button><div class="pill">👤 Onur Yilmaz</div><button class="btn secondary" onclick="setScreen('login')">Abmelden</button></div></div>`}function login(){const isTenant=state.role==='tenant',isManager=state.role==='manager',isAdmin=state.role==='admin';return `<div class="login-bg"><section class="hero">${logo()}<h1>Mietermanagement, Gewährleistung und Capmo-Sync in einem klaren Workflow.</h1><p>Moderne Plattform für Mieter, Verwalter, Eigentümer und Gewährleistungsmanager – orientiert am bestehenden innoclix Design.</p><div style="display:flex;gap:14px;margin-top:28px"><button class="btn" onclick="state.role='tenant';render()">Mieter melden Anliegen</button><button class="btn secondary" onclick="state.role='manager';render()">Verwalter Login</button></div></section><section class="login-panel"><div class="login-card">${logo()}<div class="role-tabs"><button class="${isTenant?'active':''}" onclick="state.role='tenant';render()">Mieter</button><button class="${isManager?'active':''}" onclick="state.role='manager';render()">Verwalter</button><button class="${isAdmin?'active':''}" onclick="state.role='admin';render()">Admin</button></div><h2>${isTenant?'Mieter Login':isManager?'Verwalter / Eigentümer Login':'Admin / Gewährleistungsmanager Login'}</h2><p class="muted">${isTenant?'Bitte melden Sie Ihr Anliegen mit Mieter-Nr. und Nachname.':'Bitte melden Sie sich mit Ihrem Konto an.'}</p><div style="height:14px"></div>${isTenant?`<div class="form-group"><label>Mieter-Nr.</label><input class="input" value="M-2025-0042"></div><div class="form-group"><label>Nachname</label><input class="input" value="Yilmaz"></div>`:`<div class="form-group"><label>E-Mail-Adresse</label><input class="input" value="onur@example.de"></div><div class="form-group"><label>Passwort</label><input class="input" type="password" value="password"></div>${isAdmin?`<div class="form-group"><label>Authentifizierungscode (2FA)</label><input class="input" value="123456"></div>`:''}`}<button class="btn" style="width:100%;margin-top:8px" onclick="setScreen('${isTenant?'tenant':'manager'}')">${isTenant?'Anliegen melden / Einloggen':'Einloggen'}</button><button class="btn ghost" style="width:100%;margin-top:18px" onclick="state.role='tenant';render()">← Zurück zur Auswahl</button></div></section></div>`}function projectsScreen(){return `${topbar('projects')}<main class="content"><div class="toolbar"><div class="filters"><input class="input" placeholder="Suchen..."><select class="select"><option>Standardprojekte</option></select></div><button class="btn">+ Projekt hinzufügen</button></div><div class="grid">${projects.map((p,i)=>`<div class="card project-card" onclick="state.selectedProject=${i};setScreen('manager')"><div><div class="project-title">${p[0]}</div><div class="project-address">${p[1]}</div></div><div class="stats"><div class="stat"><strong>${p[2]}</strong><span>Startdatum</span></div><div class="stat"><strong>${p[3]}</strong><span>Anliegen</span></div><div class="stat"><strong>${p[4]}</strong><span>Capmo Tickets</span></div></div></div>`).join('')}</div></main>`}function tenantDashboard(){return `${topbar('overview')}<main class="content"><div class="dash-head"><div><h1>Hallo Herr Yilmaz,</h1><p class="muted">hier ist Ihr aktueller Überblick.</p></div><button class="btn" onclick="openModal()">+ Neues Anliegen</button></div><div class="tenant-grid"><section class="card section"><div style="display:flex;justify-content:space-between"><h2>Meine Anliegen</h2><a class="muted">Alle anzeigen</a></div><div class="ticket-row">${[['Offen','Wasserleck im Badezimmer','ANL-2025-00045','red'],['In Bearbeitung','Heizung funktioniert nicht','ANL-2025-00042','yellow'],['Erledigt','Türschloss defekt','ANL-2025-00032','green'],['Offen','Riss in der Wand','ANL-2025-00031','red']].map(t=>`<div class="card ticket"><div><span class="badge ${t[3]}">${t[0]}</span><h3>${t[1]}</h3><p class="muted">ID: ${t[2]}</p></div><button class="btn ghost" onclick="openModal()">Details ›</button></div>`).join('')}</div></section><section class="card section messages"><h2>Neueste Nachrichten</h2>${['Ihr Anliegen wurde aktualisiert.','Neuer Terminvorschlag für Ihr Anliegen.','Vielen Dank für Ihre Rückmeldung.'].map(m=>`<div class="msg"><b>Hausverwaltung</b><p class="muted">${m}</p></div>`).join('')}</section><section class="card section"><h2>Terminvorschläge</h2><p class="muted">Bitte wählen Sie einen Termin aus:</p>${['Do, 22.05.2025 · 09:00–11:00 Uhr','Do, 22.05.2025 · 13:00–15:00 Uhr','Fr, 23.05.2025 · 09:00–11:00 Uhr'].map((x,i)=>`<label style="display:block;padding:13px;border:1px solid #edf1f3;border-radius:8px;margin-bottom:8px"><input type="radio" name="slot" ${i==1?'checked':''}> ${x}</label>`).join('')}<button class="btn" style="width:100%">Termin bestätigen</button></section></div></main>${modal()}`}function managerDashboard(){return `${topbar('overview')}<main class="content"><div class="toolbar"><div class="filters"><select class="select"><option>Alle Projekte</option></select><select class="select"><option>Alle Gewerke</option></select><select class="select"><option>Alle Status</option></select><input class="input" value="01.01.2025 - 31.12.2025"></div><button class="btn" onclick="openModal()">+ Neues Anliegen</button></div><div class="kpis">${[['Offene Anliegen','24','+5 seit letzter Woche','red'],['In Bearbeitung','18','+3 seit letzter Woche','yellow'],['Überfällig','7','+2 seit letzter Woche','red'],['Gewährleistung','29','62% aller Anliegen','green'],['Keine Gewährleistung','18','38% aller Anliegen','blue']].map(k=>`<div class="card kpi"><small>${k[0]}</small><strong>${k[1]}</strong><div class="delta">${k[2]}</div></div>`).join('')}</div><div class="main-grid"><section class="card section"><h2>Anliegen Überblick</h2><table><thead><tr><th>ID</th><th>Projekt</th><th>Mieter</th><th>Gewerk</th><th>Status</th><th>Frist</th><th>GW</th></tr></thead><tbody>${[['ANL-2025-00045','AEC - Amelia Earhart Center','Max Mustermann','Sanitär','Offen','20.05.2025','Ja','red'],['ANL-2025-00044','WBS 10 Kelkheim','Mehmet Yilmaz','Heizung','In Bearbeitung','18.05.2025','Ja','yellow'],['ANL-2025-00043','Großer Hasenpfad 109','Anna Schmidt','Elektro','In Bearbeitung','17.05.2025','Nein','yellow'],['ANL-2025-00042','DLC App Sync Test','Jonas Weber','Trockenbau','Offen','15.05.2025','Ja','red'],['ANL-2025-00041','Lufthansa VCC','Maria Keller','Fenster','Offen','14.05.2025','Nein','red']].map(r=>`<tr onclick="openModal()" style="cursor:pointer">${r.slice(0,4).map(c=>`<td>${c}</td>`).join('')}<td><span class="badge ${r[7]}">${r[4]}</span></td><td>${r[5]}</td><td>${r[6]}</td></tr>`).join('')}</tbody></table></section><aside class="card section"><h2>Anliegen nach Status</h2><div style="font-size:80px;text-align:center;margin:20px">◔</div><p><span class="badge red">Offen 24</span></p><p><span class="badge yellow">In Bearbeitung 18</span></p><p><span class="badge green">Erledigt 32</span></p><hr style="border:0;border-top:1px solid #edf1f3"><h2>Anliegen nach Gewerk</h2>${['Sanitär','Heizung','Elektro','Trockenbau'].map((g,i)=>`<p>${g}<span style="float:right">${18-i*3}</span><br><span style="display:block;height:8px;background:#eaf0f3;border-radius:4px"><span style="display:block;width:${85-i*12}%;height:8px;background:var(--teal);border-radius:4px"></span></span></p>`).join('')}</aside></div></main>${modal()}`}function adminDashboard(){return `${topbar('settings')}<main class="content"><div class="main-grid"><section class="card section"><h2>Plattform Überblick</h2><div class="kpis" style="grid-template-columns:repeat(4,1fr)">${[['Organisationen',24],['Nutzer',152],['Aktive Projekte',81],['Anliegen gesamt',243]].map(k=>`<div><small class="muted">${k[0]}</small><strong style="display:block;font-size:28px;margin-top:10px">${k[1]}</strong></div>`).join('')}</div><h2>Letzte Aktivitäten</h2>${['Neues Projekt „Wiesbaden, Umbau Lagerhalle“ wurde hinzugefügt.','Nutzer „Max Mustermann“ wurde der Rolle „Verwalter“ zugewiesen.','Capmo Import erfolgreich abgeschlossen.','Neue Organisation „Silcherschule“ wurde erstellt.'].map(a=>`<p style="padding:13px 0;border-bottom:1px solid #edf1f3">${a}<span class="muted" style="float:right">22.05.2025</span></p>`).join('')}</section><section class="card section"><h2>Schnellzugriff</h2><div class="quickgrid">${['Organisationen verwalten','Nutzerverwaltung','Rollen & Rechte','Integrationen','Einstellungen','Berichte'].map((q,i)=>`<div class="card quick" onclick="openModal()"><b>${q}</b><span class="muted">${['Alle Kunden & Projekte','Nutzer & Einladungen','Berechtigungen verwalten','Capmo & andere Systeme','System & Prozesse','Statistiken & Analysen'][i]}</span></div>`).join('')}</div></section></div></main>${modal()}`}function modal(){return `<div id="modal" class="modal"><div class="modal-card"><div class="modal-head"><h2>Anliegen erfassen</h2><button class="close" onclick="closeModal()">×</button></div><div class="steps"><span class="step active"></span><span class="step active"></span><span class="step"></span><span class="step"></span></div><div class="main-grid"><div><div class="form-group"><label>Kurzbeschreibung</label><input class="input" style="width:100%" value="Wasserleck im Badezimmer"></div><div class="form-group"><label>Beschreibung</label><textarea style="width:100%;min-height:120px">Seit gestern tritt Wasser unter dem Waschtisch aus.</textarea></div><div class="form-group"><label>Fotos / Dokumente</label><input class="input" style="width:100%" type="file"></div></div><div class="card section"><h2>KI Vorprüfung</h2><p><span class="badge green">Gewährleistung wahrscheinlich</span></p><p class="muted">Das Anliegen wird nach Erstellung als neues Ticket mit Status „Offen“ an Capmo übergeben. Statusänderungen aus Capmo werden zurück synchronisiert.</p><button class="btn" onclick="closeModal()">Anliegen speichern</button></div></div></div></div>`}function go(id){if(id==='projects')setScreen('projects');else if(id==='settings')setScreen('admin');else setScreen(state.screen==='tenant'?'tenant':'manager')}function setScreen(s){state.screen=s;render()}function openModal(){document.getElementById('modal')?.classList.add('show')}function closeModal(){document.getElementById('modal')?.classList.remove('show')}function render(){const app=document.getElementById('app');app.innerHTML=state.screen==='login'?login():state.screen==='projects'?projectsScreen():state.screen==='tenant'?tenantDashboard():state.screen==='admin'?adminDashboard():managerDashboard()}render();</script></body></html>
